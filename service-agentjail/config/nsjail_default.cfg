name: "agentjail-sandbox"

mode: ONCE

time_limit: 30
rlimit_as_type: SOFT
rlimit_cpu_type: SOFT
rlimit_fsize: 64
rlimit_nofile: 32

clone_newnet: true
clone_newuser: true
clone_newns: true
clone_newpid: true
clone_newipc: true
clone_newuts: true

uidmap { inside_id: "1000" outside_id: "" count: 1 }
gidmap { inside_id: "1000" outside_id: "" count: 1 }

mount { src: "/usr"   dst: "/usr"   is_bind: true  rw: false }
mount { src: "/lib"   dst: "/lib"   is_bind: true  rw: false }
mount { src: "/lib64" dst: "/lib64" is_bind: true  rw: false  mandatory: false }
mount { src: "/bin"   dst: "/bin"   is_bind: true  rw: false }
mount { src: "/sbin"  dst: "/sbin"  is_bind: true  rw: false }
mount { src: "/etc"   dst: "/etc"   is_bind: true  rw: false }
mount { dst: "/tmp"   fstype: "tmpfs"  rw: true  options: "size=67108864" }
mount { dst: "/dev"   fstype: "tmpfs"  rw: true }

cwd: "/home"

envar: "PATH=/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin"
envar: "HOME=/home"
envar: "TERM=xterm"

keep_caps: false
disable_rl: false

pids_max: 64
