name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: service-agentjail
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - run: uv sync --extra dev
      - run: uv run ruff check src/ tests/
      - run: uv run ruff format --check src/ tests/

  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: service-agentjail
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - run: uv sync --extra dev
      - run: uv run pytest tests/unit -v

  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: service-agentjail
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - run: uv sync --extra dev
      - name: Debug nsjail in container
        working-directory: service-agentjail
        run: |
          docker build -f dev.dockerfile -t agentjail-debug .
          docker run --privileged --rm agentjail-debug sh -c "nsjail --help 2>&1 | head -5 || true"
          docker run --privileged --rm agentjail-debug sh -c "nsjail --mode o --user 1000 --group 1000 --time_limit 5 -- /bin/echo hello 2>&1 || echo EXIT_CODE=\$?"
      - run: uv run pytest tests/integration -v
